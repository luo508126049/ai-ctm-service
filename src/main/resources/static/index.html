<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能客服</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<main class="chat-shell">
    <section class="support-panel" aria-label="客服信息">
        <div class="brand">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img">
                    <path d="M12 3.5c4.7 0 8.5 3.4 8.5 7.7 0 2.5-1.3 4.7-3.3 6.1l.5 3.2-3.3-1.8c-.8.2-1.6.3-2.4.3-4.7 0-8.5-3.4-8.5-7.8S7.3 3.5 12 3.5Z"/>
                    <path d="M8.3 11.4h.1M12 11.4h.1M15.7 11.4h.1"/>
                </svg>
            </span>
            <div>
                <h1>AI 智能客服</h1>
                <p>基于 RAG 知识库实时回答售后、物流、会员积分等问题</p>
            </div>
        </div>

        <div class="status-card">
            <div class="status-row">
                <span class="status-dot"></span>
                <span>服务在线</span>
            </div>
            <p>回复内容会按流式 token 实时显示，适合观察 LangChain4j 的 streaming 输出效果。</p>
        </div>

        <div class="quick-section">
            <h2>常见咨询</h2>
            <button class="quick-question" type="button">退货政策是什么？</button>
            <button class="quick-question" type="button">会员积分如何使用？</button>
            <button class="quick-question" type="button">订单多久可以发货？</button>
        </div>
    </section>

    <section class="conversation" aria-label="实时对话">
        <header class="conversation-header">
            <div>
                <h2>客服对话</h2>
                <p id="connectionText">等待提问</p>
            </div>
            <button class="ghost-button" id="clearBtn" type="button" aria-label="清空对话">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/>
                </svg>
            </button>
        </header>

        <div class="messages" id="messages" aria-live="polite">
            <article class="message assistant">
                <div class="avatar" aria-hidden="true">AI</div>
                <div class="bubble">
                    <p>你好，我是智能客服。你可以咨询退货、物流、会员积分等问题。</p>
                </div>
            </article>
        </div>

        <form class="composer" id="chatForm">
            <label class="sr-only" for="messageInput">请输入问题</label>
            <textarea id="messageInput" rows="1" maxlength="1000" placeholder="输入你的问题，按 Enter 发送，Shift + Enter 换行"></textarea>
            <button class="stop-button" id="stopBtn" type="button" hidden>停止</button>
            <button class="send-button" id="sendBtn" type="submit" aria-label="发送消息">
                <span>发送</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
            </button>
        </form>
    </section>
</main>
<script src="./app.js"></script>
</body>
</html>
